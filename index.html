<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Tracker</title>
  <link rel="stylesheet" href="lib/tabulator.min.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <!-- ── Main application shell ─────────────────────────────────────────── -->
  <div id="app">

    <!-- Menu bar -->
    <div id="menu-bar">
      <div class="menu-item" id="menu-file">File
        <div class="dropdown">
          <div class="dropdown-item" id="cmd-new">New</div>
          <div class="dropdown-item" id="cmd-open">Open...</div>
          <div class="dropdown-item" id="cmd-import">Import...</div>
          <div class="dropdown-item" id="cmd-save">Save...</div>
        </div>
      </div>
      <div class="menu-item" id="menu-view">View
        <div class="dropdown">
          <div class="dropdown-item" id="cmd-view-accounts">Accounts</div>
          <div class="dropdown-item" id="cmd-view-payees">Payees</div>
          <div class="dropdown-item" id="cmd-view-aliases">Aliases</div>
          <div class="dropdown-item" id="cmd-view-patterns">Patterns</div>
          <div class="dropdown-item" id="cmd-view-categories">Categories</div>
        </div>
      </div>
      <div class="menu-item" id="menu-reports">Reports
        <div class="dropdown">
          <div class="dropdown-item" id="cmd-report-category">Spend by category</div>
          <div class="dropdown-item" id="cmd-report-payee">Spend by payee</div>
        </div>
      </div>
      <div class="menu-item" id="menu-tools">Tools
        <div class="dropdown">
          <div class="dropdown-item" id="cmd-apply-pattern">Apply pattern...</div>
          <div class="dropdown-item" id="cmd-remove-duplicates">Remove duplicates...</div>
          <div class="dropdown-item" id="cmd-query-db">Query database...</div>
        </div>
      </div>
      <div id="db-status">Loading...</div>
    </div>

    <!-- Tab strip: scrollable tab bar + anchored refresh button -->
    <div id="tab-strip">
      <div id="tab-bar"></div>
      <button id="tab-refresh" title="Refresh current tab">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>

    <!-- Tab content panels (built dynamically) -->
    <div id="tab-content"></div>

  </div>

  <!-- ── Modal overlay ─────────────────────────────────────────────────── -->
  <div id="modal-backdrop" class="hidden"></div>
  <div id="modal-container" class="hidden"></div>

  <!-- ── Scripts (load order matters — dependencies first) ─────────────── -->
  <script src="lib/sql-wasm.js"></script>
  <script src="lib/tabulator.min.js"></script>
  <script src="js/schema.js"></script>
  <script src="js/db.js"></script>
  <script src="js/dialogs.js"></script>
  <script src="js/import.js"></script>
  <script src="js/tab-accounts.js"></script>
  <script src="js/tab-transactions.js"></script>
  <script src="js/tab-payees.js"></script>
  <script src="js/tab-aliases.js"></script>
  <script src="js/tab-patterns.js"></script>
  <script src="js/tab-categories.js"></script>
  <script src="js/tab-query.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
